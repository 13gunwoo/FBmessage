<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F&amp;B 신제품 소식</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; }

  .header { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 24px 20px; text-align: center; }
  .header h1 { font-size: 22px; margin-bottom: 6px; }
  .header p { font-size: 13px; opacity: 0.8; }

  .tab-bar { display: flex; overflow-x: auto; background: white; border-bottom: 2px solid #eee; padding: 0 12px; gap: 4px; scrollbar-width: none; }
  .tab-bar::-webkit-scrollbar { display: none; }
  .tab-btn { flex-shrink: 0; padding: 12px 16px; border: none; background: none; font-size: 14px; color: #888; cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -2px; white-space: nowrap; }
  .tab-btn.active { color: #667eea; font-weight: bold; border-bottom-color: #667eea; }

  .content { padding: 16px; max-width: 800px; margin: 0 auto; }

  /* 전체보기 그리드 */
  .thumb-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .thumb-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); cursor: pointer; transition: transform 0.15s; }
  .thumb-card:hover { transform: translateY(-2px); }
  .thumb-img-wrap { width: 100%; aspect-ratio: 1; overflow: hidden; background: #f0f0f0; }
  .thumb-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
  .thumb-label { padding: 10px 12px; font-size: 13px; font-weight: 600; color: #333; line-height: 1.4; }

  /* 브랜드 상세 카드 */
  .detail-card { background: white; border-radius: 16px; margin-bottom: 16px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
  .detail-img-wrap img { width: 100%; max-height: 280px; object-fit: cover; display: block; }
  .detail-content { padding: 16px; }
  .detail-title { font-size: 16px; font-weight: bold; color: #222; margin-bottom: 14px; line-height: 1.4; }
  .info-table { width: 100%; border-collapse: collapse; margin-bottom: 14px; font-size: 14px; }
  .info-table th { width: 72px; text-align: left; color: #888; padding: 6px 0; font-weight: 500; }
  .info-table td { color: #333; padding: 6px 0; }
  .link-btn { display: block; text-align: center; background: #f0f0f0; color: #555; padding: 10px; border-radius: 8px; text-decoration: none; font-size: 13px; }
  .link-btn:hover { background: #e0e0e0; }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }
  #panel_all { display: none; }
  #panel_all.active { display: block; }

  .footer { text-align: center; color: #bbb; font-size: 12px; padding: 20px; }
</style>
</head>
<body>

<div class="header">
  <h1>📢 F&amp;B 신제품 소식</h1>
  <p>2026년 06월 20일 기준</p>
</div>

<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('all')">전체</button>
        <button class="tab-btn" onclick="switchTab('세븐일레븐')">세븐일레븐</button>
        <button class="tab-btn" onclick="switchTab('이디야')">이디야</button>

</div>

<div class="content">
  <div class="tab-panel active" id="panel_all">
    <div class="thumb-grid">
      
        <div class="thumb-card" onclick="switchTab('세븐일레븐')" title="🆕 세븐일레븐 신제품">
            <div class="thumb-img-wrap">
                <img src="" onerror="this.parentElement.style.background='#eee'">
            </div>
            <div class="thumb-label">🆕 세븐일레븐 신제품</div>
        </div>
        <div class="thumb-card" onclick="switchTab('이디야')" title="🆕 이디야 신제품">
            <div class="thumb-img-wrap">
                <img src="" onerror="this.parentElement.style.background='#eee'">
            </div>
            <div class="thumb-label">🆕 이디야 신제품</div>
        </div>
    </div>
  </div>
  
        <div class="tab-panel" id="panel_세븐일레븐">
            
            <div class="detail-card">
                <div class="detail-img-wrap">
                    <img src="" onerror="this.style.display='none'">
                </div>
                <div class="detail-content">
                    <div class="detail-title">🆕 세븐일레븐 신제품</div>
                    <table class="info-table">
                        <tr><th>제품명</th><td>추가 조사 필요</td></tr>
                        <tr><th>가격</th><td>추가 조사 필요</td></tr>
                        <tr><th>출시일</th><td>추가 조사 필요</td></tr>
                    </table>
                    <a href="https://www.instagram.com/seven_eleven_korea/" target="_blank" class="link-btn">인스타그램에서 보기 →</a>
                </div>
            </div>
        </div>
        <div class="tab-panel" id="panel_이디야">
            
            <div class="detail-card">
                <div class="detail-img-wrap">
                    <img src="" onerror="this.style.display='none'">
                </div>
                <div class="detail-content">
                    <div class="detail-title">🆕 이디야 신제품</div>
                    <table class="info-table">
                        <tr><th>제품명</th><td>추가 조사 필요</td></tr>
                        <tr><th>가격</th><td>추가 조사 필요</td></tr>
                        <tr><th>출시일</th><td>추가 조사 필요</td></tr>
                    </table>
                    <a href="https://www.instagram.com/ediya_coffee/" target="_blank" class="link-btn">인스타그램에서 보기 →</a>
                </div>
            </div>
        </div>
</div>

<div class="footer">자동 수집된 F&amp;B 신제품 정보입니다</div>

<script>
function switchTab(brandId) {
  document.querySelectorAll('.tab-btn').forEach(function(btn) {
    btn.classList.remove('active');
  });
  document.querySelectorAll('.tab-panel').forEach(function(panel) {
    panel.classList.remove('active');
  });

  var targetPanel = document.getElementById('panel_' + brandId);
  if (targetPanel) targetPanel.classList.add('active');

  var buttons = document.querySelectorAll('.tab-btn');
  buttons.forEach(function(btn) {
    if (btn.getAttribute('onclick') === "switchTab('" + brandId + "')") {
      btn.classList.add('active');
    }
  });
}
</script>

</body>
</html>
